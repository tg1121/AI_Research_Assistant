name: Sync to HuggingFace Space

on:
  push:
    branches: [main]

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global credential.helper store
          echo "https://tg1121:${HF_TOKEN}@huggingface.co" >> ~/.git-credentials
          git remote add space https://huggingface.co/spaces/tg1121/AI-RA

          # Push a clean single commit (no history) so old node_modules
          # binaries from past commits are never sent to HuggingFace
          git checkout --orphan hf-deploy
          git add -A
          git commit -m "Deploy to HuggingFace Space"
          git push space hf-deploy:main --force
